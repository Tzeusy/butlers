<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Butlers · Directions</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --category-1: oklch(0.680 0.195 259.0);
    --category-2: oklch(0.640 0.220 292.5);
    --category-3: oklch(0.810 0.185 84.0);
    --category-4: oklch(0.758 0.135 183.5);
    --category-5: oklch(0.695 0.255 11.2);
    --category-6: oklch(0.640 0.218 278.0);
    --category-7: oklch(0.770 0.168 208.5);
    --category-8: oklch(0.790 0.200 58.0);
    --font-sans: 'Inter Tight', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    --font-serif: 'Source Serif 4', Georgia, serif;
  }
  body { margin: 0; font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }
  .tnum { font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="butler-directions.jsx"></script>
  <script type="text/babel">
    const { StatusBoardVariant, SwimLanesVariant, MasterDetailVariant, DirectoryVariant } = window.BUTLER_VARIANTS;

    function App() {
      // Force dark for the variant mockups (they're built for it)
      React.useEffect(() => { window.applyTheme('dark'); }, []);

      return (
        <DesignCanvas>
          <DCSection id="ops" title="Operational" subtitle="Read state at a glance">
            <DCArtboard id="board" label="A · Status Board" width={1280} height={720}>
              <StatusBoardVariant />
            </DCArtboard>
            <DCArtboard id="lanes" label="B · Swim Lanes" width={1280} height={720}>
              <SwimLanesVariant />
            </DCArtboard>
          </DCSection>
          <DCSection id="inspect" title="Inspection" subtitle="Drill into one butler">
            <DCArtboard id="md" label="C · Master / Detail" width={1280} height={720}>
              <MasterDetailVariant />
            </DCArtboard>
            <DCArtboard id="dir" label="D · Directory · Dossiers" width={1280} height={840}>
              <DirectoryVariant />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
