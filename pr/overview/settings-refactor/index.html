<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<title>Settings · redesign proposals</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --category-1: oklch(0.680 0.195 259.0);
    --category-2: oklch(0.640 0.220 292.5);
    --category-3: oklch(0.810 0.185 84.0);
    --category-4: oklch(0.758 0.135 183.5);
    --category-5: oklch(0.695 0.255 11.2);
    --category-6: oklch(0.640 0.218 278.0);
    --category-7: oklch(0.770 0.168 208.5);
    --category-8: oklch(0.790 0.200 58.0);
    --font-sans:  'Inter Tight', system-ui, sans-serif;
    --font-mono:  'JetBrains Mono', ui-monospace, monospace;
    --font-serif: 'Source Serif 4', Georgia, serif;
  }
  html, body { margin: 0; font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }
  .tnum { font-variant-numeric: tabular-nums; }
  *::-webkit-scrollbar { width: 8px; height: 8px; }
  *::-webkit-scrollbar-thumb { background: oklch(0 0 0 / 0.12); border-radius: 4px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="settings-redesign.jsx"></script>
  <script type="text/babel" src="settings-expanded.jsx"></script>
  <script type="text/babel">
    const { SettingsLedger, SettingsConsole, SettingsManifest, ModelCatalogExpanded } = window.SETTINGS_REDESIGN;
    const { ButlersExpanded, SpendDashboard, MemoryExpanded, ApprovalsPage, DataExpanded } = window.SETTINGS_EXPANDED;
    function App() {
      React.useEffect(() => { window.applyTheme('dark'); }, []);
      return (
        <DesignCanvas>
          <DCSection
            id="settings-redesign"
            title="Settings · redesign proposals"
            subtitle="Three angles on /settings — all in the post-overhaul language. Each artboard is a working layout, not a wireframe."
          >
            <DCArtboard id="ledger"   label="A · The Ledger — editorial, single column"   width={1400} height={1320}><SettingsLedger /></DCArtboard>
            <DCArtboard id="console"  label="B · The Console — panel grid + attention strip"    width={1400} height={1280}><SettingsConsole /></DCArtboard>
            <DCArtboard id="manifest" label="C · The Manifest — numbered spec sheet"     width={1400} height={1480}><SettingsManifest /></DCArtboard>
          </DCSection>
          <DCSection
            id="settings-subroutes"
            title="Settings sub-routes · the three that stay"
            subtitle="Only three categories are truly system-side settings. Each opens from a Console panel. Per-butler config moves to /butlers/{name}; memory ops move to /memory; approvals becomes its own top-level route."
          >
            <DCArtboard id="catalog" label="§1 · /settings/models — catalog grouped by complexity tier (51 models)" width={1700} height={1200}><ModelCatalogExpanded /></DCArtboard>
            <DCArtboard id="spend"   label="§2 · /settings/spend — forecast, breakdowns, routing rules"             width={1500} height={1400}><SpendDashboard /></DCArtboard>
            <DCArtboard id="data"    label="§3 · /settings/permissions — full matrix, audit reel, webhooks"          width={1500} height={1500}><DataExpanded /></DCArtboard>
          </DCSection>
          <DCSection
            id="adjacent"
            title="Adjacent routes · what moved out of settings"
            subtitle="The Approvals view becomes its own /approvals page (this design replaces the existing one). The Butlers and Memory designs from the previous round fold into existing /butlers/{name} and /memory pages — kept here as reference for that integration."
          >
            <DCArtboard id="approvals" label="/approvals — inbox + quiet-hours + policy (replaces existing)" width={1500} height={1300}><ApprovalsPage /></DCArtboard>
            <DCArtboard id="butlers-ref" label="REF · butler-detail-page integration — prompt, tools, fallback, activity" width={1500} height={1400}><ButlersExpanded /></DCArtboard>
            <DCArtboard id="memory-ref"  label="REF · /memory integration — tier flow, retention, compaction, inspect" width={1500} height={1400}><MemoryExpanded /></DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
