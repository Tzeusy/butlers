<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Butlers · Entities — catalog &amp; navigation explorations</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:         oklch(0.145 0 0);
    --bg-elev:    oklch(0.205 0 0);
    --bg-deep:    oklch(0.115 0 0);
    --fg:         oklch(0.985 0 0);
    --mfg:        oklch(0.708 0 0);
    --dim:        oklch(0.55 0 0);
    --border:       oklch(1 0 0 / 0.10);
    --border-soft:  oklch(1 0 0 / 0.06);
    --border-strong:oklch(1 0 0 / 0.18);
    --red:    oklch(0.685 0.250 29.2);
    --amber:  oklch(0.810 0.185 84.0);
    --green:  oklch(0.790 0.195 148.2);
    --blue:   oklch(0.680 0.195 259.0);

    --cat-relationship: oklch(0.680 0.195 259.0);
    --cat-memory:       oklch(0.640 0.220 292.5);
    --cat-calendar:     oklch(0.810 0.185 84.0);
    --cat-health:       oklch(0.758 0.135 183.5);
    --cat-household:    oklch(0.695 0.255 11.2);
    --cat-education:    oklch(0.640 0.218 278.0);
    --cat-qa:           oklch(0.770 0.168 208.5);
    --cat-chronicler:   oklch(0.790 0.200 58.0);

    --tier-1: oklch(0.547 0.215 27.5);
    --tier-2: oklch(0.605 0.205 46.5);
    --tier-3: oklch(0.568 0.147 66.0);
    --tier-4: oklch(0.597 0.155 152.0);
    --tier-5: oklch(0.599 0.140 237.5);

    --font-sans: 'Inter Tight', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    --font-serif: 'Source Serif 4', Georgia, serif;
  }

  html, body { background: var(--bg); color: var(--fg); }
  body {
    margin: 0;
    font-family: var(--font-sans);
    font-feature-settings: 'ss01','cv11';
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }
  .tnum { font-variant-numeric: tabular-nums; }

  *::-webkit-scrollbar { width: 8px; height: 8px; }
  *::-webkit-scrollbar-thumb { background: oklch(1 0 0 / 0.12); border-radius: 999px; }
  *::-webkit-scrollbar-track { background: transparent; }

  /* shared atoms */
  .eyebrow {
    font-family: var(--font-mono); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--mfg);
  }
  .voice {
    font-family: var(--font-serif); font-size: 16px;
    line-height: 1.6; max-width: 64ch; color: var(--fg);
  }
  .voice em { color: var(--mfg); font-style: italic; }
  .kind-tag {
    font-family: var(--font-mono); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--mfg);
  }
  .mono { font-family: var(--font-mono); }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    border: 1px solid var(--border-strong);
    border-radius: 3px; padding: 3px 8px;
    font-family: var(--font-mono); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--mfg); background: transparent; cursor: pointer;
    line-height: 1;
  }
  .pill[aria-pressed="true"] {
    background: var(--fg); color: var(--bg); border-color: var(--fg);
  }

  hr.rule {
    border: 0; border-top: 1px solid var(--border);
    margin: 0;
  }

  a.deep {
    color: inherit; text-decoration: underline;
    text-underline-offset: 4px;
    text-decoration-color: var(--border-strong);
  }
  a.deep:hover { text-decoration-color: var(--fg); }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="atoms.jsx"></script>
  <script type="text/babel" src="catalog.jsx"></script>
  <script type="text/babel" src="exp-index.jsx"></script>
  <script type="text/babel" src="exp-orbit.jsx"></script>
  <script type="text/babel" src="exp-hop.jsx"></script>
  <script type="text/babel" src="exp-columns.jsx"></script>
  <script type="text/babel" src="exp-concentration.jsx"></script>
  <script type="text/babel" src="exp-command.jsx"></script>
  <script type="text/babel" src="exp-detail.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
