# git-cliff configuration
# https://git-cliff.org/docs/configuration

[changelog]
# Changelog header
header = """
# Changelog\n
All notable changes to Butlers will be documented in this file.\n
"""
# Template for each release
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
            {{ commit.message | upper_first }}\
            {% if commit.breaking %} [**breaking**]{% endif %}\
    {% endfor %}
{% endfor %}\n
"""
# Remove leading/trailing whitespace from body
trim = true
# Changelog footer
footer = ""

[git]
# Parse conventional commits
conventional_commits = true
filter_unconventional = true
split_commits = false

# Process each line as a commit
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^test", group = "Testing" },
    { message = "^docs", group = "Documentation" },
    { message = "^chore", group = "Miscellaneous" },
    { message = "^ci", group = "CI/CD" },
    { body = ".*security", group = "Security" },
]

# Protect breaking changes from being skipped
protect_breaking_commits = false

# Filter commits by type
filter_commits = false

# Tags sorted by date
tag_pattern = "v[0-9].*"

# Skip tags matching this pattern
skip_tags = ""

# Ignore tags matching this pattern
ignore_tags = ""

# Sort commits inside sections
sort_commits = "oldest"
