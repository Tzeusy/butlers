# Dev overlay — extends docker-compose.yml with connectors, oauth gate, and backend.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml --profile hotreload up
#
# Prerequisites:
#   - tailscale serve configured on host (see scripts/dev.sh header for setup)
#   - .env with bootstrap vars (see .env.example)
#
# Profiles:
#   (default)   — baked images, production deps only
#   hotreload   — volume-mount src/ for live code changes + uv sync --dev at start

x-connector-env: &connector-env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_USER: butlers
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-butlers}
  SWITCHBOARD_MCP_URL: http://switchboard:41100/sse
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}

services:
  # ── Layer 0.5 override: mount roster for migrations ───────────────────
  migrations:
    volumes:
      - ./roster:/app/roster:ro

  # One-shot: create timestamped log directory and "latest" symlink.
  # Writes the run dir path using /app/logs prefix so service containers
  # (which mount ./logs at /app/logs) can use it directly.
  log-init:
    image: alpine:3.19
    entrypoint: ["sh", "-c"]
    command:
      - |
        STAMP="$(date +%Y%m%d_%H%M%S)"
        mkdir -p "/logs/$STAMP"
        rm -f /logs/latest
        ln -s "$STAMP" /logs/latest
        echo "/app/logs/$STAMP" > /logs/.current_run_dir
        echo "Log directory: /app/logs/$STAMP"
    volumes:
      - ./logs:/logs

  # ── Layer 1a override: dashboard-api with OAuth redirect URI ──────────
  dashboard-api:
    environment:
      - GOOGLE_OAUTH_REDIRECT_URI=${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:41200/api/oauth/google/callback}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET:-}
      - BUTLERS_DISABLE_FILE_LOGGING=1
    volumes:
      - ./logs:/app/logs

  # ── Layer 1a: frontend override — correct port/base/proxy ──────────────
  # The base profile ["dev"] is always activated by dev-compose.sh.
  # Vite proxy must target dashboard-api by service name (not localhost)
  # since the frontend container runs on the [frontend] network.
  frontend-dev:
    environment:
      - VITE_API_URL=${VITE_API_URL:-/butlers-api/api}
      - VITE_PROXY_TARGET=http://dashboard-api:41200
    command: >-
      sh -c "npm install &&
      npm run dev -- --host 0.0.0.0 --port 41173 --strictPort
      --base ${FRONTEND_BASE_PATH:-/butlers/}"
    depends_on:
      dashboard-api:
        condition: service_healthy

  # ── Layer 1b: Telegram bot connector ──────────────────────────────────
  connector-telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/app/scripts/dev_entrypoint.sh", "connectors/telegram_bot", "uv", "run", "python", "-m", "butlers.connectors.telegram_bot"]
    command: []
    environment:
      <<: *connector-env
      CONNECTOR_PROVIDER: telegram
      CONNECTOR_CHANNEL: telegram_bot
    volumes:
      - ./logs:/app/logs
    networks: [db, backend, egress]
    depends_on:
      log-init:
        condition: service_completed_successfully
      migrations:
        condition: service_completed_successfully
      switchboard:
        condition: service_healthy
    restart: unless-stopped

  # ── Layer 1b: Telegram user-client connector ──────────────────────────
  connector-telegram-user:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/app/scripts/dev_entrypoint.sh", "connectors/telegram_user", "uv", "run", "python", "-m", "butlers.connectors.telegram_user_client"]
    command: []
    environment:
      <<: *connector-env
      CONNECTOR_PROVIDER: telegram
      CONNECTOR_CHANNEL: telegram_user_client
    volumes:
      - ./logs:/app/logs
    networks: [db, backend, egress]
    depends_on:
      log-init:
        condition: service_completed_successfully
      migrations:
        condition: service_completed_successfully
      switchboard:
        condition: service_healthy
    restart: unless-stopped

  # ── Layer 1b: Live listener connector (host audio devices) ────────────
  connector-live-listener:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        EXTRAS: live-listener
    entrypoint: ["/app/scripts/dev_entrypoint.sh", "connectors/live_listener", "uv", "run", "python", "-m", "butlers.connectors.live_listener"]
    command: []
    environment:
      <<: *connector-env
      CONNECTOR_PROVIDER: live-listener
      CONNECTOR_CHANNEL: voice
      CONNECTOR_HEALTH_PORT: "40091"
      LIVE_LISTENER_DEVICES: ${LIVE_LISTENER_DEVICES:-[{"name":"webcam","device":"hw:2,0"}]}
    volumes:
      - ./logs:/app/logs
    networks: [db, backend, egress]
    depends_on:
      log-init:
        condition: service_completed_successfully
      migrations:
        condition: service_completed_successfully
      switchboard:
        condition: service_healthy
    devices:
      - /dev/snd:/dev/snd
    restart: unless-stopped
    profiles: [audio]

  # ── Layer 2: OAuth gate (one-shot) ────────────────────────────────────
  oauth-gate:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["uv", "run", "python", "scripts/oauth_gate.py"]
    command: []
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=butlers
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-butlers}
      - POSTGRES_DB=${POSTGRES_DB:-butlers}
      - OAUTH_GATE_TIMEOUT=${OAUTH_GATE_TIMEOUT:-0}
      - OAUTH_POLL_INTERVAL=${OAUTH_POLL_INTERVAL:-5}
      - SKIP_OAUTH_CHECK=${SKIP_OAUTH_CHECK:-false}
    networks: [db]
    depends_on:
      dashboard-api:
        condition: service_healthy

  # ── Layer 3: butlers up (main backend) ────────────────────────────────
  # butlers up spawns LLM runtime CLIs (codex, opencode, claude-code, gemini)
  # as subprocesses. Their config/auth dirs must persist across restarts.
  butlers-up:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/app/scripts/dev_entrypoint.sh", "butlers/up", "uv", "run", "butlers", "up"]
    command: []
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=butlers
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-butlers}
      - BUTLERS_SWITCHBOARD_URL=http://switchboard:41100
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - HOME=/root
    volumes:
      - ./roster:/app/roster:ro
      - ./logs:/app/logs
      - runtime_claude:/root/.claude
      - runtime_codex:/root/.codex
      - runtime_opencode:/root/.opencode
      - runtime_gemini:/root/.gemini
    networks: [db, backend, egress]
    depends_on:
      log-init:
        condition: service_completed_successfully
      oauth-gate:
        condition: service_completed_successfully
      switchboard:
        condition: service_healthy
    restart: unless-stopped

  # ── Layer 3: Gmail connector (post-OAuth) ─────────────────────────────
  connector-gmail:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/app/scripts/dev_entrypoint.sh", "connectors/gmail", "uv", "run", "python", "-m", "butlers.connectors.gmail"]
    command: []
    environment:
      <<: *connector-env
      CONNECTOR_PROVIDER: gmail
      CONNECTOR_CHANNEL: email
      CONNECTOR_BUTLER_DB_NAME: ${POSTGRES_DB:-butlers}
      CONNECTOR_BUTLER_DB_SCHEMA: shared
      BUTLER_SHARED_DB_NAME: ${POSTGRES_DB:-butlers}
      BUTLER_SHARED_DB_SCHEMA: shared
    volumes:
      - ./logs:/app/logs
    networks: [db, backend, egress]
    depends_on:
      log-init:
        condition: service_completed_successfully
      oauth-gate:
        condition: service_completed_successfully
      switchboard:
        condition: service_healthy
    restart: unless-stopped

  # ── Hotreload overrides (profile: hotreload) ──────────────────────────
  # When --profile hotreload is active, these replace the baked-image
  # versions of butlers-up and dashboard-api with volume-mounted source.
  # The base services scale to 0 when hotreload variants are active.

  butlers-up-hotreload:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: [hotreload]
    entrypoint: ["sh", "-c", "uv sync --dev && exec uv run butlers up"]
    command: []
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=butlers
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-butlers}
      - BUTLERS_SWITCHBOARD_URL=http://switchboard:41100
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - HOME=/root
    volumes:
      - ./src:/app/src
      - ./roster:/app/roster:ro
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./logs:/app/logs
      - uv_cache:/root/.cache/uv
      - runtime_claude:/root/.claude
      - runtime_codex:/root/.codex
      - runtime_opencode:/root/.opencode
      - runtime_gemini:/root/.gemini
    networks: [db, backend, egress]
    depends_on:
      log-init:
        condition: service_completed_successfully
      oauth-gate:
        condition: service_completed_successfully
      switchboard:
        condition: service_healthy
    restart: unless-stopped

  dashboard-api-hotreload:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: [hotreload]
    entrypoint: ["sh", "-c", "uv sync --dev && exec uv run butlers dashboard --host 0.0.0.0 --port 41200"]
    command: []
    ports:
      - "127.0.0.1:41200:41200"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=butlers
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-butlers}
      - GOOGLE_OAUTH_REDIRECT_URI=${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:41200/api/oauth/google/callback}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET:-}
      - BUTLERS_DISABLE_FILE_LOGGING=1
    volumes:
      - ./src:/app/src
      - ./roster:/app/roster:ro
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./logs:/app/logs
      - uv_cache:/root/.cache/uv
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:41200/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      migrations:
        condition: service_completed_successfully
    networks: [db, backend, frontend, egress]

volumes:
  uv_cache:
  # Persistent config/auth dirs for LLM runtime CLIs spawned by butlers-up.
  # Survives container restarts so OAuth tokens and settings aren't lost.
  runtime_claude:
  runtime_codex:
  runtime_opencode:
  runtime_gemini:
