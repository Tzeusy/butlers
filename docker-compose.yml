# Docker Compose configuration for Butlers AI agent framework
#
# USAGE:
#
# Development mode (local butlers with containerized DB and observability):
#   docker compose up -d postgres
#   butlers up
#
# Production mode (all services containerized):
#   cp .env.example .env
#   # Edit .env and add your ANTHROPIC_API_KEY
#   docker compose up -d
#
# All butler services will be available on their configured ports:
#   - switchboard: 41100
#   - general: 41101
#   - relationship: 41102
#   - health: 41103
#   - dashboard-api: 41200
#
# Service status:
#   FUNCTIONAL (roster/ directories exist, configs are complete):
#     - postgres        — database server (always functional)
#     - switchboard     — routes incoming requests to butlers
#     - general         — catch-all assistant butler
#     - relationship    — contacts and interactions butler
#     - health          — medications and health tracking butler
#     - dashboard-api   — web UI backend
#     - frontend-dev    — Vite dev server (profile: dev)
#   ASPIRATIONAL (roster/ directories exist but butler may lack full config):
#     - education, finance, home, messenger, travel — in roster, not yet in compose
#
# Observability: Grafana/Tempo tracing via LGTM stack (Alloy OTLP endpoint)

services:
  # PostgreSQL database server
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: butlers
      POSTGRES_PASSWORD: butlers
      POSTGRES_DB: butlers
      POSTGRES_HOST_AUTH_METHOD: trust
    command: ["postgres", "-c", "max_connections=200"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "54320:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U butlers"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO — S3-compatible blob storage for dev/CI
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Create default bucket on MinIO startup
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/butlers-blobs --ignore-existing;
      exit 0;
      "

  # Switchboard butler - message router
  switchboard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "41100:41100"
    volumes:
      - ./roster/switchboard:/etc/butler:ro
    command: ["run", "--config", "/etc/butler"]
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=butlers
      - POSTGRES_PASSWORD=butlers
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel.parrot-hen.ts.net:4318
    depends_on:
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully

  # General butler - catch-all assistant
  general:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "41101:41101"
    volumes:
      - ./roster/general:/etc/butler:ro
    command: ["run", "--config", "/etc/butler"]
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=butlers
      - POSTGRES_PASSWORD=butlers
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel.parrot-hen.ts.net:4318
    depends_on:
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully

  # Relationship butler - contacts and interactions
  relationship:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "41102:41102"
    volumes:
      - ./roster/relationship:/etc/butler:ro
    command: ["run", "--config", "/etc/butler"]
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=butlers
      - POSTGRES_PASSWORD=butlers
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel.parrot-hen.ts.net:4318
    depends_on:
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully

  # Health butler - medications and health tracking
  health:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "41103:41103"
    volumes:
      - ./roster/health:/etc/butler:ro
    command: ["run", "--config", "/etc/butler"]
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=butlers
      - POSTGRES_PASSWORD=butlers
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel.parrot-hen.ts.net:4318
    depends_on:
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully

  # Dashboard API - web UI backend for monitoring and managing butlers
  dashboard-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "41200:41200"
    volumes:
      - ./roster:/app/roster:ro
    command: ["dashboard", "--host", "0.0.0.0", "--port", "41200"]
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=butlers
      - POSTGRES_PASSWORD=butlers
    depends_on:
      postgres:
        condition: service_healthy

  # Frontend dev server (Vite) — only starts with: docker compose --profile dev up
  frontend-dev:
    image: node:22-slim
    profiles: ["dev"]
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "41173:41173"
    environment:
      - VITE_API_URL=http://dashboard-api:41200
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - dashboard-api

volumes:
  postgres_data:
    external: true
    name: butlers_postgres_data
  minio_data:
  frontend_node_modules:
