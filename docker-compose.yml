# Docker Compose configuration for Butlers AI agent framework
#
# USAGE:
#
#   docker compose up                              # full stack
#   docker compose --profile dev up                # + frontend dev server
#   docker compose --profile hotreload up          # + live source code reload
#   docker compose --profile audio up              # + live-listener connector
#   ./scripts/dev-compose.sh                       # recommended dev launcher
#   ./scripts/dev-compose.sh --hotreload           # with live code reload
#
# PROFILES:
#   (default)  — all core services: postgres, migrations, butlers-up, connectors,
#                dashboard-api, oauth-gate, log infrastructure
#   dev        — + Vite frontend dev server
#   hotreload  — + volume-mount src/ for live code changes (scales down butlers-up
#                and dashboard-api, replaces with *-hotreload variants)
#   audio      — + live-listener connector (requires /dev/snd)
#   minio      — + local S3-compatible storage (production uses Garage on tailnet)
#
# NETWORK MODEL (see RFC 0008):
#   db        (internal) — postgres, minio, migrations
#   backend   (internal) — inter-service communication
#   frontend  (internal) — Vite dev server <-> dashboard-api
#   egress    (bridge)   — outbound internet for LLM APIs, Google OAuth, etc.
#   Private subnets blocked by scripts/egress-firewall.sh (auto-applied by launcher)

# ── Shared environment anchors ──────────────────────────────────────────

x-postgres-env: &postgres-env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_USER: butlers
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-butlers}

x-connector-env: &connector-env
  <<: *postgres-env
  SWITCHBOARD_MCP_URL: http://switchboard:41100/sse
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}

# Note: runtime volume mounts (runtime_claude, etc.) are repeated per service
# because YAML anchors cannot merge into lists. This is a YAML limitation.

# ── Services ────────────────────────────────────────────────────────────

services:

  # ── Layer 0: Infrastructure ───────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: butlers
      POSTGRES_PASSWORD: butlers
      POSTGRES_DB: butlers
      POSTGRES_HOST_AUTH_METHOD: trust
    command: ["postgres", "-c", "max_connections=200"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:54320:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U butlers"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [db]

  # MinIO — local S3 (optional). Production uses Garage on tailnet.
  minio:
    image: minio/minio:latest
    profiles: [minio]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [db]

  minio-setup:
    image: minio/mc:latest
    profiles: [minio]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/butlers-blobs --ignore-existing;
      exit 0;
      "
    networks: [db]

  # ── Layer 0.5: Migrations + Log Init ──────────────────────────────────

  migrations:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["db", "migrate"]
    environment:
      <<: *postgres-env
    volumes:
      - ./roster:/app/roster:ro
    networks: [db]
    depends_on:
      postgres:
        condition: service_healthy

  log-init:
    image: alpine:3.19
    entrypoint: ["sh", "-c"]
    command:
      - |
        STAMP="$(date +%Y%m%d_%H%M%S)"
        mkdir -p "/logs/$STAMP"
        rm -f /logs/latest
        ln -s "$STAMP" /logs/latest
        echo "/app/logs/$STAMP" > /logs/.current_run_dir
        echo "Log directory: /app/logs/$STAMP"
    volumes:
      - ./logs:/logs

  # ── Layer 1a: Dashboard + Frontend ────────────────────────────────────

  dashboard-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:41200:41200"
    volumes:
      - ./roster:/app/roster:ro
      - ./logs:/app/logs
    command: ["dashboard", "--host", "0.0.0.0", "--port", "41200"]
    environment:
      <<: *postgres-env
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:41200/api/oauth/google/callback}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      BUTLERS_DISABLE_FILE_LOGGING: "1"
    depends_on:
      migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:41200/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks: [db, backend, frontend, egress]

  frontend-dev:
    image: node:22-slim
    profiles: [dev]
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "127.0.0.1:41173:41173"
    environment:
      - VITE_API_URL=${VITE_API_URL:-/butlers-api/api}
      - VITE_PROXY_TARGET=http://dashboard-api:41200
    command: >-
      sh -c "npm install &&
      npm run dev -- --host 0.0.0.0 --port 41173 --strictPort
      --base ${FRONTEND_BASE_PATH:-/butlers/}"
    depends_on:
      dashboard-api:
        condition: service_healthy
    networks: [frontend]

  # ── Layer 1b: Connectors ──────────────────────────────────────────────

  connector-telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/app/scripts/dev_entrypoint.sh", "connectors/telegram_bot", "uv", "run", "python", "-m", "butlers.connectors.telegram_bot"]
    command: []
    environment:
      <<: *connector-env
      CONNECTOR_PROVIDER: telegram
      CONNECTOR_CHANNEL: telegram_bot
    volumes:
      - ./logs:/app/logs
    networks: [db, backend, egress]
    depends_on:
      log-init:
        condition: service_completed_successfully
      migrations:
        condition: service_completed_successfully
      switchboard:
        condition: service_healthy
    restart: unless-stopped

  connector-telegram-user:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/app/scripts/dev_entrypoint.sh", "connectors/telegram_user", "uv", "run", "python", "-m", "butlers.connectors.telegram_user_client"]
    command: []
    environment:
      <<: *connector-env
      CONNECTOR_PROVIDER: telegram
      CONNECTOR_CHANNEL: telegram_user_client
    volumes:
      - ./logs:/app/logs
    networks: [db, backend, egress]
    depends_on:
      log-init:
        condition: service_completed_successfully
      migrations:
        condition: service_completed_successfully
      switchboard:
        condition: service_healthy
    restart: unless-stopped

  connector-live-listener:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        EXTRAS: live-listener
    profiles: [audio]
    entrypoint: ["/app/scripts/dev_entrypoint.sh", "connectors/live_listener", "uv", "run", "python", "-m", "butlers.connectors.live_listener"]
    command: []
    environment:
      <<: *connector-env
      CONNECTOR_PROVIDER: live-listener
      CONNECTOR_CHANNEL: voice
      CONNECTOR_HEALTH_PORT: "40091"
      LIVE_LISTENER_DEVICES: ${LIVE_LISTENER_DEVICES:-[{"name":"webcam","device":"hw:2,0"}]}
    volumes:
      - ./logs:/app/logs
    networks: [db, backend, egress]
    depends_on:
      log-init:
        condition: service_completed_successfully
      migrations:
        condition: service_completed_successfully
      switchboard:
        condition: service_healthy
    devices:
      - /dev/snd:/dev/snd
    restart: unless-stopped

  # ── Layer 2: OAuth Gate ───────────────────────────────────────────────

  oauth-gate:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["uv", "run", "python", "scripts/oauth_gate.py"]
    command: []
    environment:
      <<: *postgres-env
      POSTGRES_DB: ${POSTGRES_DB:-butlers}
      OAUTH_GATE_TIMEOUT: ${OAUTH_GATE_TIMEOUT:-0}
      OAUTH_POLL_INTERVAL: ${OAUTH_POLL_INTERVAL:-5}
      SKIP_OAUTH_CHECK: ${SKIP_OAUTH_CHECK:-false}
    networks: [db]
    depends_on:
      dashboard-api:
        condition: service_healthy

  # ── Layer 3: Butler Backend + Gmail ───────────────────────────────────
  # butlers-up starts all butler daemons (switchboard, general, relationship,
  # health, etc.) in a single process. Each butler's MCP server listens on
  # its configured port. LLM runtime CLIs are spawned as subprocesses.

  switchboard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:41100:41100"
    volumes:
      - ./roster/switchboard:/etc/butler:ro
      - runtime_claude:/root/.claude
      - runtime_codex:/root/.codex
      - runtime_opencode:/root/.opencode
      - runtime_gemini:/root/.gemini
    command: ["run", "--config", "/etc/butler"]
    environment:
      <<: *postgres-env
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      HOME: /root
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:41100/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    depends_on:
      migrations:
        condition: service_completed_successfully
    networks: [db, backend, egress]

  butlers-up:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/app/scripts/dev_entrypoint.sh", "butlers/up", "uv", "run", "butlers", "up"]
    command: []
    environment:
      <<: *postgres-env
      BUTLERS_SWITCHBOARD_URL: http://switchboard:41100
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      HOME: /root
    volumes:
      - ./roster:/app/roster:ro
      - ./logs:/app/logs
      - runtime_claude:/root/.claude
      - runtime_codex:/root/.codex
      - runtime_opencode:/root/.opencode
      - runtime_gemini:/root/.gemini
    networks: [db, backend, egress]
    depends_on:
      log-init:
        condition: service_completed_successfully
      oauth-gate:
        condition: service_completed_successfully
      switchboard:
        condition: service_healthy
    restart: unless-stopped

  connector-gmail:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/app/scripts/dev_entrypoint.sh", "connectors/gmail", "uv", "run", "python", "-m", "butlers.connectors.gmail"]
    command: []
    environment:
      <<: *connector-env
      CONNECTOR_PROVIDER: gmail
      CONNECTOR_CHANNEL: email
      CONNECTOR_BUTLER_DB_NAME: ${POSTGRES_DB:-butlers}
      CONNECTOR_BUTLER_DB_SCHEMA: shared
      BUTLER_SHARED_DB_NAME: ${POSTGRES_DB:-butlers}
      BUTLER_SHARED_DB_SCHEMA: shared
    volumes:
      - ./logs:/app/logs
    networks: [db, backend, egress]
    depends_on:
      log-init:
        condition: service_completed_successfully
      oauth-gate:
        condition: service_completed_successfully
      switchboard:
        condition: service_healthy
    restart: unless-stopped

  # ── Hotreload profile ─────────────────────────────────────────────────
  # Volume-mount source for live code changes. Use --scale butlers-up=0
  # --scale dashboard-api=0 to prevent conflicts (handled by dev-compose.sh).

  butlers-up-hotreload:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: [hotreload]
    entrypoint: ["sh", "-c", "uv sync --dev && exec uv run butlers up"]
    command: []
    environment:
      <<: *postgres-env
      BUTLERS_SWITCHBOARD_URL: http://switchboard:41100
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      HOME: /root
    volumes:
      - ./src:/app/src
      - ./roster:/app/roster:ro
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./logs:/app/logs
      - uv_cache:/root/.cache/uv
      - runtime_claude:/root/.claude
      - runtime_codex:/root/.codex
      - runtime_opencode:/root/.opencode
      - runtime_gemini:/root/.gemini
    networks: [db, backend, egress]
    depends_on:
      log-init:
        condition: service_completed_successfully
      oauth-gate:
        condition: service_completed_successfully
      switchboard:
        condition: service_healthy
    restart: unless-stopped

  dashboard-api-hotreload:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: [hotreload]
    entrypoint: ["sh", "-c", "uv sync --dev && exec uv run butlers dashboard --host 0.0.0.0 --port 41200"]
    command: []
    ports:
      - "127.0.0.1:41200:41200"
    environment:
      <<: *postgres-env
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:41200/api/oauth/google/callback}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      BUTLERS_DISABLE_FILE_LOGGING: "1"
    volumes:
      - ./src:/app/src
      - ./roster:/app/roster:ro
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ./logs:/app/logs
      - uv_cache:/root/.cache/uv
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:41200/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      migrations:
        condition: service_completed_successfully
    networks: [db, backend, frontend, egress]

# ── Volumes ─────────────────────────────────────────────────────────────

volumes:
  postgres_data:
    external: true
    name: butlers_postgres_data
  minio_data:
  frontend_node_modules:
  uv_cache:
  runtime_claude:
  runtime_codex:
  runtime_opencode:
  runtime_gemini:

# ── Networks ────────────────────────────────────────────────────────────

networks:
  db:
    driver: bridge
    internal: true
  backend:
    driver: bridge
    internal: true
  frontend:
    driver: bridge
    internal: true
  egress:
    # Outbound internet for LLM APIs, Google OAuth, Telegram, Gmail.
    # Private subnets blocked by scripts/egress-firewall.sh.
    driver: bridge
