name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:test@localhost:5432/postgres

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint
        run: make lint

      - name: Format check
        run: uv run ruff format --check src/ tests/ roster/ conftest.py -q

      - name: SQL safety check (FOR UPDATE + outer join)
        run: make check-for-update-joins

      - name: Unit tests
        run: uv run pytest tests/ -q --maxfail=1 --tb=short --ignore=tests/e2e -m "not integration and not e2e" --cov=src/butlers --cov-report=json:coverage.json --cov-report=term-missing

      - name: Free disk space before testcontainers
        # ubuntu-latest runners arrive with ~14 GB free. Testcontainers pulls
        # pgvector/pgvector:pg17 (~442 MB compressed) and multiple modules spin
        # up independent containers concurrently under -n auto. Removing
        # pre-installed tools that are unused by this job (Android SDK, .NET,
        # Haskell, Swift, large apt caches) reclaims 10-15 GB and eliminates
        # the intermittent "no space left on device" / asyncpg pool timeout
        # failures seen in PRs #2052 and #2055.
        run: |
          echo "Disk usage before cleanup:"
          df -h /
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/share/boost
          sudo apt-get clean -q
          docker image prune -f --filter "until=1h" || true
          echo "Disk usage after cleanup:"
          df -h /

      - name: Integration tests (testcontainers)
        run: uv run pytest roster/ tests/integration/ tests/config/ tests/core/ tests/migrations/ -q --maxfail=5 --tb=short -m "integration and not nightly" -n auto --dist loadfile --cov=src/butlers --cov-append --cov-report=json:coverage.json --cov-report=term-missing
        env:
          # Testcontainers uses the Docker socket directly — no DOCKER_HOST needed on ubuntu-latest
          TESTCONTAINERS_RYUK_DISABLED: "true"

      - name: Extract coverage percentage
        id: coverage
        run: |
          COVERAGE=$(python -c "import json; print(round(json.load(open('coverage.json'))['totals']['percent_covered']))")
          echo "percentage=$COVERAGE" >> "$GITHUB_OUTPUT"
          # Color thresholds: green ≥80, yellow ≥60, red <60
          if [ "$COVERAGE" -ge 80 ]; then
            echo "color=brightgreen" >> "$GITHUB_OUTPUT"
          elif [ "$COVERAGE" -ge 60 ]; then
            echo "color=yellow" >> "$GITHUB_OUTPUT"
          else
            echo "color=red" >> "$GITHUB_OUTPUT"
          fi

      - name: Update coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ secrets.COVERAGE_GIST_ID }}
          filename: butlers-coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.percentage }}%
          color: ${{ steps.coverage.outputs.color }}

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

  guard-direct-push:
    # Detects pushes that landed on main without going through the PR-review
    # flow and fails loudly so the violation is visible in the CI dashboard.
    #
    # IMPORTANT LIMITATION: CI runs *after* the push has already been accepted
    # by GitHub. This job can only detect and flag the violation — it cannot
    # prevent it. To truly block direct pushes, enable GitHub branch protection
    # on main (Settings → Branches → Branch protection rules → "Require a pull
    # request before merging"). This guard is a complementary in-repo signal.
    #
    # How it distinguishes a legitimate squash/merge-commit landing from a raw
    # "git push origin main":
    #   The GitHub Commits API (commits/{sha}/pulls) returns the PRs associated
    #   with a given commit. A commit that arrived via GitHub's merge button
    #   (squash, merge, or rebase) will have at least one entry in that list.
    #   A commit pushed directly will return an empty array. This heuristic is
    #   reliable for any merge strategy the GitHub UI produces. See bu-ue37d.
    #
    # Tradeoff: The API call requires `pull-requests: read` permission and uses
    # the built-in GITHUB_TOKEN, so no extra secrets are needed. One edge case:
    # if a PR is deleted after merging, the API may return an empty list for the
    # merge commit — this is very uncommon and acceptable for a detection guard.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check that HEAD commit arrived via a merged PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          echo "Checking whether $SHA on main is associated with a merged PR..."
          PR_COUNT=$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${REPO}/commits/${SHA}/pulls" \
            --jq 'length')

          if [ "${PR_COUNT:-0}" -gt 0 ]; then
            echo "OK: commit ${SHA} is associated with ${PR_COUNT} PR(s). Legitimate merge."
          else
            echo ""
            echo "ERROR: commit ${SHA} was pushed directly to main without an associated PR."
            echo ""
            echo "This bypasses code review and the safety gates enforced by the PR workflow."
            echo "All changes to main must go through a pull request. See: bu-ue37d"
            echo ""
            echo "NOTE: This guard detects the violation after the push has already landed."
            echo "To prevent direct pushes entirely, enable GitHub branch protection on main"
            echo "(Settings -> Branches -> Branch protection rules -> 'Require a pull request"
            echo "before merging'). The owner should enable branch protection as the"
            echo "authoritative prevention control."
            exit 1
          fi

  frontend-e2e:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npm run test:e2e:install

      - name: Build (required for vite preview)
        run: npm run build
        env:
          VITE_INGESTION_DISPATCH_CONSOLE: "true"

      - name: Run Playwright e2e tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
