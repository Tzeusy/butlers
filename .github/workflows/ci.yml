name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:test@localhost:5432/postgres

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Check lock file is up to date
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Lint
        run: make lint

      - name: Format check
        run: uv run ruff format --check src/ tests/ roster/ conftest.py -q

      - name: SQL safety check (FOR UPDATE + outer join)
        run: make check-for-update-joins

      - name: Unit tests
        run: uv run pytest tests/ -q --maxfail=1 --tb=short --ignore=tests/e2e -m "not integration and not e2e" --cov=src/butlers --cov-report=json:coverage.json --cov-report=term-missing

      - name: Smoke tests (fast gate + release evidence)
        id: smoke
        run: |
          mkdir -p .tmp/smoke
          SMOKE_CMD="uv run pytest tests/ --ignore=tests/e2e -m smoke -q --tb=short"

          START_TS=$(date +%s)
          set +e
          $SMOKE_CMD --junit-xml=.tmp/smoke/junit.xml 2>&1 | tee .tmp/smoke/smoke.log
          SMOKE_EXIT=${PIPESTATUS[0]}
          set -e
          END_TS=$(date +%s)
          DURATION_S=$((END_TS - START_TS))
          [ "$SMOKE_EXIT" -eq 0 ] && STATUS=PASS || STATUS=FAIL

          # Write release-evidence JSON and emit a clearly-formatted log line.
          SMOKE_EXIT_VAL=$SMOKE_EXIT \
          SMOKE_SHA="${{ github.sha }}" \
          SMOKE_DURATION=$DURATION_S \
          SMOKE_STATUS=$STATUS \
          SMOKE_CMD_VAL="$SMOKE_CMD" \
          python3 << 'PYEOF'
          import json, os, xml.etree.ElementTree as ET

          sha = os.environ["SMOKE_SHA"]
          duration_s = int(os.environ["SMOKE_DURATION"])
          exit_code = int(os.environ["SMOKE_EXIT_VAL"])
          status = os.environ["SMOKE_STATUS"]
          cmd = os.environ["SMOKE_CMD_VAL"]

          try:
              root = ET.parse(".tmp/smoke/junit.xml").getroot()
              skipped_classes = sorted({
                  tc.get("classname") or tc.get("name", "unknown")
                  for tc in root.findall(".//testcase")
                  if tc.find("skipped") is not None
              })
          except Exception as exc:
              skipped_classes = [f"parse-error:{exc}"]

          evidence = {
              "cmd": cmd,
              "sha": sha,
              "duration_s": duration_s,
              "status": status,
              "exit_code": exit_code,
              "skipped_classes": skipped_classes,
          }
          with open(".tmp/smoke/release-evidence.json", "w") as f:
              json.dump(evidence, f, indent=2)

          print(f"SMOKE-RELEASE-EVIDENCE cmd={cmd!r} sha={sha!r} duration={duration_s}s status={status!r} skipped_classes={skipped_classes!r}")
          print()
          print(json.dumps(evidence, indent=2))
          PYEOF

          exit $SMOKE_EXIT
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"

      - name: Upload smoke release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-release-evidence
          path: .tmp/smoke/
          retention-days: 30

      - name: Free disk space before testcontainers
        # ubuntu-latest runners arrive with ~14 GB free. Testcontainers pulls
        # pgvector/pgvector:pg17 (~442 MB compressed) and multiple modules spin
        # up independent containers concurrently under -n auto. Removing
        # pre-installed tools that are unused by this job (Android SDK, .NET,
        # Haskell, Swift, large apt caches) reclaims 10-15 GB and eliminates
        # the intermittent "no space left on device" / asyncpg pool timeout
        # failures seen in PRs #2052 and #2055.
        run: |
          echo "Disk usage before cleanup:"
          df -h /
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/share/boost
          sudo apt-get clean -q
          docker image prune -f --filter "until=1h" || true
          echo "Disk usage after cleanup:"
          df -h /

      - name: Integration tests (testcontainers)
        run: uv run pytest roster/ tests/integration/ tests/config/ tests/core/ tests/migrations/ -q --maxfail=5 --tb=short -m "integration and not nightly" -n auto --dist loadfile --cov=src/butlers --cov-append --cov-report=json:coverage.json --cov-report=term-missing
        env:
          # Testcontainers uses the Docker socket directly — no DOCKER_HOST needed on ubuntu-latest
          TESTCONTAINERS_RYUK_DISABLED: "true"

      - name: Extract coverage percentage
        id: coverage
        run: |
          COVERAGE=$(python -c "import json; print(round(json.load(open('coverage.json'))['totals']['percent_covered']))")
          echo "percentage=$COVERAGE" >> "$GITHUB_OUTPUT"
          # Color thresholds: green ≥80, yellow ≥60, red <60
          if [ "$COVERAGE" -ge 80 ]; then
            echo "color=brightgreen" >> "$GITHUB_OUTPUT"
          elif [ "$COVERAGE" -ge 60 ]; then
            echo "color=yellow" >> "$GITHUB_OUTPUT"
          else
            echo "color=red" >> "$GITHUB_OUTPUT"
          fi

      - name: Update coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ secrets.COVERAGE_GIST_ID }}
          filename: butlers-coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.percentage }}%
          color: ${{ steps.coverage.outputs.color }}

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

  frontend-e2e:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npm run test:e2e:install

      - name: Build (required for vite preview)
        run: npm run build
        env:
          VITE_INGESTION_DISPATCH_CONSOLE: "true"

      - name: Run Playwright e2e tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
