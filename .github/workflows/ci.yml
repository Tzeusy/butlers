name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:test@localhost:5432/postgres

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint
        run: make lint

      - name: Format check
        run: uv run ruff format --check src/ tests/ roster/ conftest.py -q

      - name: SQL safety check (FOR UPDATE + outer join)
        run: make check-for-update-joins

      - name: Unit tests
        run: uv run pytest tests/ -q --maxfail=1 --tb=short --ignore=tests/e2e -m "not integration and not e2e" --cov=src/butlers --cov-report=json:coverage.json --cov-report=term-missing

      - name: Free disk space before testcontainers
        # ubuntu-latest runners arrive with ~14 GB free. Testcontainers pulls
        # pgvector/pgvector:pg17 (~442 MB compressed) and multiple modules spin
        # up independent containers concurrently under -n auto. Removing
        # pre-installed tools that are unused by this job (Android SDK, .NET,
        # Haskell, Swift, large apt caches) reclaims 10-15 GB and eliminates
        # the intermittent "no space left on device" / asyncpg pool timeout
        # failures seen in PRs #2052 and #2055.
        run: |
          echo "Disk usage before cleanup:"
          df -h /
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/share/boost
          sudo apt-get clean -q
          docker image prune -f --filter "until=1h" || true
          echo "Disk usage after cleanup:"
          df -h /

      - name: Integration tests (testcontainers)
        run: uv run pytest roster/ tests/integration/ tests/config/ tests/core/ tests/migrations/ -q --maxfail=5 --tb=short -m "integration and not nightly" -n auto --dist loadfile --cov=src/butlers --cov-append --cov-report=json:coverage.json --cov-report=term-missing
        env:
          # Testcontainers uses the Docker socket directly — no DOCKER_HOST needed on ubuntu-latest
          TESTCONTAINERS_RYUK_DISABLED: "true"

      - name: Extract coverage percentage
        id: coverage
        run: |
          COVERAGE=$(python -c "import json; print(round(json.load(open('coverage.json'))['totals']['percent_covered']))")
          echo "percentage=$COVERAGE" >> "$GITHUB_OUTPUT"
          # Color thresholds: green ≥80, yellow ≥60, red <60
          if [ "$COVERAGE" -ge 80 ]; then
            echo "color=brightgreen" >> "$GITHUB_OUTPUT"
          elif [ "$COVERAGE" -ge 60 ]; then
            echo "color=yellow" >> "$GITHUB_OUTPUT"
          else
            echo "color=red" >> "$GITHUB_OUTPUT"
          fi

      - name: Update coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ secrets.COVERAGE_GIST_ID }}
          filename: butlers-coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.percentage }}%
          color: ${{ steps.coverage.outputs.color }}

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

  guard-direct-push:
    # Detects pushes that landed on main without going through the PR-review
    # flow and fails loudly so the violation is visible in the CI dashboard.
    #
    # IMPORTANT LIMITATION: CI runs *after* the push has already been accepted
    # by GitHub. This job can only detect and flag the violation — it cannot
    # prevent it. To truly block direct pushes, enable GitHub branch protection
    # on main (Settings → Branches → Branch protection rules → "Require a pull
    # request before merging"). This guard is a complementary in-repo signal.
    #
    # How it distinguishes a legitimate squash/merge-commit landing from a raw
    # "git push origin main":
    #   Two complementary checks are performed:
    #   1. commits/{sha}/pulls — returns PRs associated with the commit. Populated
    #      by GitHub after merging, but subject to a short indexing delay (race
    #      window of a few seconds). Retried up to 4 times with 10 s backoff to
    #      absorb the lag. See bu-sev4v.
    #   2. merge_commit_sha fallback — if retries are exhausted, searches the 30
    #      most recently updated closed PRs (sort=updated&direction=desc) for one
    #      whose merge_commit_sha matches SHA. GitHub sets merge_commit_sha
    #      synchronously at merge time, so this is reliably available even for
    #      brand-new squash merges. Sorting by updated_at ensures a long-lived PR
    #      merged just now still appears in the first page.
    #   A commit pushed directly will not appear in either query.
    #
    # Tradeoff: Both calls require `pull-requests: read` and use the built-in
    # GITHUB_TOKEN, so no extra secrets are needed. One edge case: if a PR is
    # deleted after merging, the API may return an empty list — this is very
    # uncommon and acceptable for a detection guard.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check that HEAD commit arrived via a merged PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          echo "Checking whether $SHA on main is associated with a merged PR..."

          # --- Check 1: commits/{sha}/pulls with retry ---
          # GitHub indexes the commit→PR link asynchronously after a squash merge.
          # Retry up to 4 times (10 s apart, max ~30 s) to absorb the indexing lag.
          PR_COUNT=0
          for attempt in 1 2 3 4; do
            PR_COUNT=$(gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${REPO}/commits/${SHA}/pulls" \
              --jq 'length')
            if [ "${PR_COUNT:-0}" -gt 0 ]; then
              break
            fi
            if [ "$attempt" -lt 4 ]; then
              echo "  attempt ${attempt}: commits/${SHA}/pulls returned 0 — waiting 10 s for GitHub to index..."
              sleep 10
            fi
          done

          if [ "${PR_COUNT:-0}" -gt 0 ]; then
            echo "OK: commit ${SHA} is associated with ${PR_COUNT} PR(s). Legitimate merge."
            exit 0
          fi

          # --- Check 2: merge_commit_sha fallback ---
          # merge_commit_sha is set synchronously by GitHub at merge time, so it is
          # available immediately even for brand-new squash merges. Search the 30
          # most recently updated closed PRs for a matching SHA. sort=updated ensures
          # a PR merged just now (regardless of when it was created) appears in the
          # first page even in a high-velocity repo.
          echo "  commits/${SHA}/pulls still empty after retries — trying merge_commit_sha fallback..."
          MERGE_SHA_MATCH=$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${REPO}/pulls?state=closed&sort=updated&direction=desc&per_page=30" \
            --jq "[.[] | select(.merge_commit_sha == \"${SHA}\")] | length")

          if [ "${MERGE_SHA_MATCH:-0}" -gt 0 ]; then
            echo "OK: commit ${SHA} matches merge_commit_sha on ${MERGE_SHA_MATCH} closed PR(s). Legitimate merge."
            exit 0
          fi

          echo ""
          echo "ERROR: commit ${SHA} was pushed directly to main without an associated PR."
          echo ""
          echo "This bypasses code review and the safety gates enforced by the PR workflow."
          echo "All changes to main must go through a pull request. See: bu-ue37d"
          echo ""
          echo "NOTE: This guard detects the violation after the push has already landed."
          echo "To prevent direct pushes entirely, enable GitHub branch protection on main"
          echo "(Settings -> Branches -> Branch protection rules -> 'Require a pull request"
          echo "before merging'). The owner should enable branch protection as the"
          echo "authoritative prevention control."
          exit 1

  frontend-e2e:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npm run test:e2e:install

      - name: Build (required for vite preview)
        run: npm run build
        env:
          VITE_INGESTION_DISPATCH_CONSOLE: "true"

      - name: Run Playwright e2e tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
