[butler]
name = "messenger"
port = 41104
description = "Outbound delivery execution plane for Telegram and Email"

[butler.runtime]
max_concurrent_sessions = 3

[butler.switchboard]
url = "http://localhost:41100/mcp"

[butler.seed_configs]
runtime_type = "codex"
model = "gpt-5.1"
liveness_ttl_seconds = 300
route_contract_min = 1
route_contract_max = 1

[butler.db]
name = "butlers"
schema = "messenger"

[modules.calendar]
provider = "google"

[modules.calendar.conflicts]
policy = "suggest"

[modules.telegram]

[modules.telegram.user]
enabled = false

[modules.telegram.bot]
token_env = "BUTLER_TELEGRAM_TOKEN"

[modules.email]
send_tools = true

[modules.email.user]
enabled = false

[modules.email.bot]
address_env = "BUTLER_EMAIL_ADDRESS"
password_env = "BUTLER_EMAIL_PASSWORD"

[modules.approvals]
enabled = true
default_expiry_hours = 48
default_risk_tier = "medium"

[modules.approvals.gated_tools.telegram_send_message]
risk_tier = "medium"

[modules.approvals.gated_tools.telegram_reply_to_message]
risk_tier = "medium"

[modules.approvals.gated_tools.telegram_react_to_message]
risk_tier = "low"

[modules.approvals.gated_tools.email_send_message]
risk_tier = "medium"

[modules.approvals.gated_tools.email_reply_to_thread]
risk_tier = "medium"

[modules.approvals.gated_tools.notify]
risk_tier = "medium"

[modules.messenger]
