[butler]
name = "messenger"
port = 41104
description = "Outbound delivery execution plane for Telegram and Email"
type = "staffer"

[butler.permissions]
cross_butler_access = ["*"]

[butler.runtime_seed]
max_concurrent_sessions = 3
liveness_ttl_seconds = 300
route_contract_min = 1
route_contract_max = 1

[butler.switchboard]
url = "http://localhost:41100/mcp"

[butler.db]
name = "butlers"
schema = "messenger"

# Deterministic, zero-LLM calendar meeting-prep message-context contribution.
# Precomputes recent email threads per attendee into messenger.state under
# calendar/prep/<event_id>; the prep-rail read endpoint merges it by entity_id.
[[butler.schedule]]
name = "calendar_prep_contribution"
cron = "54 6 * * *"
dispatch_mode = "job"
job_name = "calendar_prep_contribution"

[modules.calendar]
provider = "google"
groups = ["core"]

[modules.calendar.conflicts]
policy = "suggest"

[modules.telegram]

[modules.telegram.user]
enabled = false

[modules.telegram.bot]
token_env = "BUTLER_TELEGRAM_TOKEN"

[modules.email]
send_tools = true

[modules.email.user]
enabled = false

[modules.email.bot]
address_env = "BUTLER_EMAIL_ADDRESS"
password_env = "BUTLER_EMAIL_PASSWORD"

[modules.whatsapp]
# send_tools=true registers whatsapp_send_message and whatsapp_reply_to_message.
# Only the Messenger butler should set send_tools=true.
send_tools = true
# send_enabled=false keeps tools present but functionally disabled by default.
# Set send_enabled=true only after assessing WhatsApp ban risk for your account.
# Rate limit target: 10 messages/min (conservative — unofficial protocol, ban risk).
# Per-request timeout: 20s (bridge IPC + WhatsApp relay).
send_enabled = false

[modules.whatsapp.user]
enabled = true
session_env = "WHATSAPP_USER_SESSION"

[modules.approvals]
groups = ["actions", "rules"]
enabled = true
default_expiry_hours = 48
default_risk_tier = "medium"

[modules.approvals.gated_tools.telegram_send_message]
risk_tier = "medium"

[modules.approvals.gated_tools.telegram_reply_to_message]
risk_tier = "medium"

[modules.approvals.gated_tools.telegram_react_to_message]
risk_tier = "low"

[modules.approvals.gated_tools.email_send_message]
risk_tier = "medium"

[modules.approvals.gated_tools.email_reply_to_thread]
risk_tier = "medium"

[modules.approvals.gated_tools.notify]
risk_tier = "medium"

[modules.approvals.gated_tools.whatsapp_send_message]
risk_tier = "medium"

[modules.approvals.gated_tools.whatsapp_reply_to_message]
risk_tier = "medium"

[modules.messenger]

# Google Drive module (optional — requires 'drive' scope on connected Google account).
# Enable by uncommenting and re-authorizing via /api/oauth/google/start?force_consent=true
# [modules.google_drive]
# account = ""              # Google account email (default: primary account)
# max_read_size_bytes = 10485760  # 10 MB cap for drive_read_file
# butler_folder_name = "butlers"  # root folder name at Drive root for butler outputs
