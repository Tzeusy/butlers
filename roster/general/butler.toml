[butler]
name = "general"
port = 41101
description = "Flexible catch-all assistant for freeform data"

[butler.runtime_seed]
max_concurrent_sessions = 3
liveness_ttl_seconds = 300
route_contract_min = 1
route_contract_max = 1

[butler.db]
name = "butlers"
schema = "general"

[butler.switchboard]
url = "http://localhost:41100/mcp"

[modules.calendar]
provider = "google"
groups = ["core", "butler_events"]

[modules.calendar.conflicts]
policy = "suggest"

[modules.contacts]
provider = "google"
include_other_contacts = false

[modules.contacts.sync]
enabled = true
run_on_startup = true
interval_minutes = 15
full_sync_interval_days = 6

[[butler.schedule]]
name = "memory_consolidation"
cron = "0 */6 * * *"
dispatch_mode = "job"
job_name = "memory_consolidation"

[[butler.schedule]]
name = "memory_episode_cleanup"
cron = "0 4 * * *"
dispatch_mode = "job"
job_name = "memory_episode_cleanup"

[[butler.schedule]]
name = "eod-tomorrow-prep"
cron = "0 15 * * *"
prompt = """
Tomorrow prep: review tomorrow's calendar and incorporate today's specialist highlights into a
multi-domain preparation summary you send this afternoon to get the user ready for the day ahead.
Target under 500 words total.

Steps:
1. Determine today's and tomorrow's dates in SGT (UTC+8). Today's date string format: YYYY-MM-DD.

2. Fetch specialist highlights by calling state_get('briefing/combined/<today-SGT>') where
   <today-SGT> is today's date in YYYY-MM-DD format (SGT). This returns a JSON payload with a
   `contributions` list, each entry having fields: `butler`, `has_updates`, `highlights`, `summary`.
   If state_get returns null or empty, skip to step 3 and proceed with calendar-only mode.

3. Use calendar_list_events to fetch all events for tomorrow (00:00 to 23:59 SGT).

4. Compose the briefing message as follows. Open with a title line that makes clear this previews
   the day ahead, using TOMORROW's weekday and date so the future date reads as intentional:

   **🌅 Tomorrow Prep — [Tomorrow's Weekday, Date]**
   (Do NOT call this an "end-of-day briefing" — it is sent this afternoon to prepare for tomorrow.)

   **Calendar — [Day, Date]**
   List tomorrow's events in chronological order (times in SGT). For each event: title, time,
   duration, location. Include prep notes (documents to review, travel time, items to bring).
   Note any free blocks between events. If no events: "No events scheduled for tomorrow."

   **Today's Highlights** (only include this section if any specialist contribution has
   has_updates=true — omit the section entirely if no contributions are present or all
   has_updates=false)
   For each specialist domain with has_updates=true, include one concise line using the
   pre-rendered `summary` field. Group under these domain labels as applicable (the
   mapping is fixed — one label per specialist butler, in the order specialists are
   declared in src/butlers/jobs/briefing.py::SPECIALIST_BUTLERS):
   Learning (education) · Finance · Health · Home · Lifestyle · Relationships · Travel

   **Heads-up** (optional — include only when two or more high-priority highlights across different
   domains suggest a cross-domain conflict or compounded risk, e.g., a travel departure that
   overlaps a medical appointment)
   One or two sentences maximum.

5. Length check: ensure the full message is under 500 words. Trim event prep notes or specialist
   summaries if needed to stay within limit. The calendar timeline takes priority over the
   Highlights section when trimming.

6. Send the summary via notify(channel="telegram", intent="send", message=<final briefing text>).
"""

[[butler.schedule]]
name = "collect_briefing_contributions"
cron = "58 6 * * *"
dispatch_mode = "job"
job_name = "collect_briefing_contributions"

[modules.general]

[modules.memory]
groups = ["core", "preferences", "entity"]

[modules.steam]

# Google Drive module (optional — requires 'drive' scope on connected Google account).
