[butler]
name = "travel"
port = 41106
description = "Travel logistics and itinerary intelligence specialist for flights, hotels, car rentals, and trip planning."

[butler.runtime_seed]
max_concurrent_sessions = 3
liveness_ttl_seconds = 300
route_contract_min = 1
route_contract_max = 1

[butler.db]
name = "butlers"
schema = "travel"

[butler.switchboard]
url = "http://localhost:41100/mcp"

[modules.email]

[modules.calendar]
provider = "google"
groups = ["core", "butler_events"]

[modules.calendar.conflicts]
policy = "suggest"

[modules.memory]
groups = ["core", "entity"]

[modules.travel]

[[butler.schedule]]
name = "upcoming-travel-check"
# Daily 08:00 SGT (scheduler interprets cron in UTC)
cron = "0 0 * * *"
dispatch_mode = "prompt"
prompt = """
Daily pre-trip scan. Check for upcoming departures and check-ins within the next 48 hours.
Use upcoming_travel(within_days=2, include_pretrip_actions=true) to surface:
- Flights departing soon (with terminal, gate, PNR)
- Hotel check-ins approaching
- Missing boarding passes or travel documents
- Pending online check-in windows (24h before departure)
- Tight layover warnings

If any actionable items are found, send an urgency-ranked summary via
notify(channel="telegram", intent="send", message=<summary>).
If nothing is upcoming, do not send a message.
"""

[[butler.schedule]]
name = "trip-document-expiry"
cron = "0 9 * * 1"
dispatch_mode = "prompt"
prompt = """
Weekly travel document expiry scan. Check all stored travel documents (passports, visas, insurance policies)
for expiry dates within the next 90 days.

For documents expiring within 30 days, create a calendar reminder if one does not already exist.
Send an alert via notify(channel="telegram", intent="send", message=<expiry_summary>)
for any documents approaching expiry, ranked by urgency.
If all documents are current, do not send a message.
"""

[[butler.schedule]]
name = "insight-scan"
cron = "45 7 * * *"
dispatch_mode = "job"
job_name = "insight_scan"

[[butler.schedule]]
name = "daily_briefing_contribution"
cron = "55 6 * * *"
dispatch_mode = "job"
job_name = "daily_briefing_contribution"

[[butler.schedule]]
name = "calendar_overlay_contribution"
cron = "50 6 * * *"
dispatch_mode = "job"
job_name = "calendar_overlay_contribution"

