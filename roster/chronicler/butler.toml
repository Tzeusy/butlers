[butler]
name = "chronicler"
port = 41111
description = "Retrospective time butler: reconstructs lived past time from other butlers' timestamped evidence as point events and overlapping episodes, with source provenance and correction history"

[butler.runtime_seed]
max_concurrent_sessions = 2
liveness_ttl_seconds = 300
route_contract_min = 1
route_contract_max = 1

[butler.db]
name = "butlers"
schema = "chronicler"

[butler.switchboard]
url = "http://localhost:41100/mcp"

[modules.chronicler]

# Projection adapters run as scheduled jobs, NOT as modules or connectors.
# Chronicler does not own any connector and does not ingest external events.

[[butler.schedule]]
name = "chronicler_project_sessions"
cron = "*/15 * * * *"
dispatch_mode = "job"
job_name = "chronicler_project_sessions"

[[butler.schedule]]
name = "chronicler_project_calendar"
cron = "10 * * * *"
dispatch_mode = "job"
job_name = "chronicler_project_calendar"

[[butler.schedule]]
name = "chronicler_project_owntracks"
cron = "*/30 * * * *"
dispatch_mode = "job"
job_name = "chronicler_project_owntracks"

[[butler.schedule]]
name = "chronicler_project_steam"
cron = "*/30 * * * *"
dispatch_mode = "job"
job_name = "chronicler_project_steam"

[[butler.schedule]]
name = "chronicler_project_meals"
cron = "*/30 * * * *"
dispatch_mode = "job"
job_name = "chronicler_project_meals"

[[butler.schedule]]
name = "chronicler_project_home_assistant"
cron = "*/30 * * * *"
dispatch_mode = "job"
job_name = "chronicler_project_home_assistant"

[[butler.schedule]]
name = "chronicler_project_google_health_sleep"
cron = "*/30 * * * *"
dispatch_mode = "job"
job_name = "chronicler_project_google_health_sleep"

[[butler.schedule]]
name = "chronicler_day_close"
cron = "5 1 * * *"
dispatch_mode = "prompt"
complexity = "high"
prompt = """
Run the Chronicler day-close interpretation for yesterday:
1. Compute yesterday's date (the day before today UTC).
2. Call `chronicler_day_close_bundle(date_label="<yesterday>")` to fetch a
   pre-truncated, token-bounded bundle.  Do NOT call chronicler_list_episodes
   or chronicler_list_events directly — the bundle tool enforces the hard cap
   and sensitive-event masking.
3. If the bundle contains no episodes and no events, exit silently.
4. Produce a brief day-close summary (3-10 bullet points) that:
   - Cites source_ref values from the bundle's citations list.
   - Notes any roll-up entries (sources with rollup=true) by count.
   - Does NOT echo or infer sensitive payloads.
5. Send the summary via notify(channel="telegram", intent="send", message=<summary>).
"""
