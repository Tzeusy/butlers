[butler]
name = "home"
port = 41108
description = "Smart home automation orchestrator for comfort, energy, and device management"

[butler.runtime]
max_concurrent_sessions = 3

[butler.db]
name = "butlers"
schema = "home"

[butler.switchboard]
url = "http://localhost:41100/mcp"

[butler.seed_configs]
runtime_type = "codex"
model = "gpt-5.1"
liveness_ttl_seconds = 300
route_contract_min = 1
route_contract_max = 1

[modules.home_assistant]

[modules.memory]

[modules.contacts]
provider = "google"
include_other_contacts = false

[modules.contacts.sync]
enabled = true
run_on_startup = true
interval_minutes = 15
full_sync_interval_days = 6

[modules.approvals]

[[butler.schedule]]
name = "weekly-energy-digest"
cron = "0 9 * * 0"
dispatch_mode = "job"
job_name = "energy_digest"

[[butler.schedule]]
name = "environment-report"
cron = "0 8 * * *"
dispatch_mode = "job"
job_name = "environment_report"

[[butler.schedule]]
name = "device-health-check"
cron = "0 4 * * *"
dispatch_mode = "job"
job_name = "device_health_check"

[[butler.schedule]]
name = "maintenance-schedule-check"
cron = "0 10 * * 1"
dispatch_mode = "job"
job_name = "maintenance_schedule_check"

[[butler.schedule]]
name = "memory_consolidation"
cron = "0 */6 * * *"
dispatch_mode = "job"
job_name = "memory_consolidation"

[[butler.schedule]]
name = "memory_episode_cleanup"
cron = "5 4 * * *"
dispatch_mode = "job"
job_name = "memory_episode_cleanup"

[[butler.schedule]]
name = "memory_purge_superseded"
cron = "10 4 * * *"
dispatch_mode = "job"
job_name = "memory_purge_superseded"

[[butler.schedule]]
name = "daily_briefing_contribution"
cron = "55 6 * * *"
dispatch_mode = "job"
job_name = "daily_briefing_contribution"

# Google Drive module (optional — requires 'drive' scope on connected Google account).
# Enable by uncommenting and re-authorizing via /api/oauth/google/start?force_consent=true
# [modules.google_drive]
