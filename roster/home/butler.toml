[butler]
name = "home"
port = 41108
description = "Smart home automation orchestrator for comfort, energy, and device management"

[butler.runtime]
max_concurrent_sessions = 3

[butler.db]
name = "butlers"
schema = "home"

[butler.switchboard]
url = "http://localhost:41100/mcp"

[butler.seed_configs]
runtime_type = "codex"
model = "gpt-5.1"
liveness_ttl_seconds = 300
route_contract_min = 1
route_contract_max = 1

[modules.home_assistant]

[modules.memory]

[modules.contacts]
provider = "google"
include_other_contacts = false

[modules.contacts.sync]
enabled = true
run_on_startup = true
interval_minutes = 15
full_sync_interval_days = 6

[modules.approvals]

[[butler.schedule]]
name = "weekly-energy-digest"
cron = "0 21 * * 0"
dispatch_mode = "prompt"
prompt = """
Generate and send a weekly energy efficiency digest for the user. Analyze device usage patterns,
energy consumption trends, and inefficiencies from the past 7 days. Identify devices with high
energy usage, peak demand times, and opportunities for optimization. Include recommendations
for adjusting schedules or settings. Compose a structured summary highlighting energy savings
achieved and potential future savings. Deliver via
notify(channel="telegram", intent="send", message=<digest>).
"""

[[butler.schedule]]
name = "environment-report"
cron = "5 21 * * 0"
dispatch_mode = "prompt"
prompt = """
Generate and send a weekly home environment report for the user. Check current temperature,
humidity, air quality, lighting levels, and other environmental metrics. Compare against
user's comfort preferences and alert if any readings are outside acceptable ranges. Provide
actionable recommendations (e.g., "humidity is low, consider running humidifier"). Deliver via
notify(channel="telegram", intent="send", message=<report>).
"""

[[butler.schedule]]
name = "device-health-check"
cron = "10 21 * * 0"
dispatch_mode = "prompt"
prompt = """
Perform a nightly device health check. Query all connected devices for status, battery levels,
last communication time, and firmware updates. Flag any devices that are offline, have low battery,
or are due for updates. Store health check results for trend analysis. Always send a summary via
notify(channel="telegram", intent="send") — an alert if issues are found, or a brief all-clear
if everything is healthy.
"""

[[butler.schedule]]
name = "memory_consolidation"
cron = "0 */6 * * *"
dispatch_mode = "job"
job_name = "memory_consolidation"

[[butler.schedule]]
name = "memory_episode_cleanup"
cron = "5 4 * * *"
dispatch_mode = "job"
job_name = "memory_episode_cleanup"

[[butler.schedule]]
name = "memory_purge_superseded"
cron = "10 4 * * *"
dispatch_mode = "job"
job_name = "memory_purge_superseded"

