[butler]
name = "switchboard"
port = 41100
description = "Routes incoming messages to specialist butlers"
type = "staffer"

[butler.permissions]
cross_butler_access = ["*"]

[butler.runtime_seed]
max_concurrent_sessions = 3
# Only register core tool groups the switchboard actually uses.
# Omitted groups (state, scheduling, sessions, media) had 0 LLM calls
# over 30 days per session tool_calls audit (2026-04-07).
core_groups = [
    "infra",                # status, trigger, route.execute, tick, correct
    "notifications",        # notify, remind
    "module_mgmt",          # module.states, module.set_enabled
    "switchboard_routing",  # ingest, route_to_butler, connector.heartbeat
    "switchboard_backfill", # backfill.poll, backfill.progress
]

[buffer]
queue_capacity = 100
worker_count = 3
scanner_interval_s = 30
scanner_grace_s = 10
scanner_batch_size = 50

[butler.db]
name = "butlers"
schema = "switchboard"

[modules.memory]
groups = ["core", "entity"]
[modules.pipeline]
enable_ingress_dedupe = true

[modules.switchboard]
groups = ["routing"]

[modules.insight_broker]

# Google Drive module (optional — requires 'drive' scope on connected Google account).
# Enable by uncommenting and re-authorizing via /api/oauth/google/start?force_consent=true
# [modules.google_drive]
# account = ""              # Google account email (default: primary account)
# max_read_size_bytes = 10485760  # 10 MB cap for drive_read_file
# butler_folder_name = "butlers"  # root folder name at Drive root for butler outputs

# Butler registry liveness sweep
[[butler.schedule]]
name = "eligibility_sweep"
cron = "*/5 * * * *"
dispatch_mode = "job"
job_name = "eligibility_sweep"

# Proactive insight delivery — runs daily at 08:00 UTC
[[butler.schedule]]
name = "insight-delivery-cycle"
cron = "0 8 * * *"
dispatch_mode = "job"
job_name = "insight_delivery_cycle"

# Spend rule 7-day savings computation (§5.4) — runs daily at 04:15 UTC (off-peak)
[[butler.schedule]]
name = "spend-rule-savings"
cron = "15 4 * * *"
dispatch_mode = "job"
job_name = "spend_rule_savings"
