[butler]
name = "switchboard"
port = 41100
description = "Routes incoming messages to specialist butlers"

[butler.runtime]
max_concurrent_sessions = 3

[butler.seed_configs]
runtime_type = "codex"
model = "gpt-5.1"

[buffer]
queue_capacity = 100
worker_count = 3
scanner_interval_s = 30
scanner_grace_s = 10
scanner_batch_size = 50

[butler.db]
name = "butlers"
schema = "switchboard"

[modules.calendar]
account = "uniquosity@gmail.com"
provider = "google"

[modules.calendar.conflicts]
policy = "suggest"

[modules.telegram]

[modules.telegram.user]
enabled = false

[modules.telegram.bot]
token_env = "BUTLER_TELEGRAM_TOKEN"

[modules.memory]

[modules.email]

[modules.email.user]
enabled = false

[modules.email.bot]
address_env = "BUTLER_EMAIL_ADDRESS"
password_env = "BUTLER_EMAIL_PASSWORD"

[modules.pipeline]
enable_ingress_dedupe = true

[modules.switchboard]

[[butler.schedule]]
name = "memory_consolidation"
cron = "0 */6 * * *"
dispatch_mode = "job"
job_name = "memory_consolidation"

[[butler.schedule]]
name = "memory_episode_cleanup"
cron = "0 4 * * *"
dispatch_mode = "job"
job_name = "memory_episode_cleanup"

# Butler registry liveness sweep
[[butler.schedule]]
name = "eligibility_sweep"
cron = "*/5 * * * *"
dispatch_mode = "job"
job_name = "eligibility_sweep"
