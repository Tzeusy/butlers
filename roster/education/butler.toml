[butler]
name = "education"
port = 41107
description = "Personalized tutor with spaced repetition, mind maps, and adaptive learning"

[butler.runtime_seed]
max_concurrent_sessions = 3
liveness_ttl_seconds = 300
route_contract_min = 1
route_contract_max = 1

[butler.db]
name = "butlers"
schema = "education"

[butler.switchboard]
url = "http://localhost:41100/mcp"

[[butler.schedule]]
name = "nightly-analytics"
cron = "0 3 * * *"
dispatch_mode = "job"
job_name = "compute_analytics_snapshots"

[[butler.schedule]]
name = "weekly-progress-digest"
cron = "0 9 * * 0"
dispatch_mode = "prompt"
prompt = """
Generate and send a weekly learning progress digest for the user. Read analytics snapshots for the
past 7 days across all active mind maps. Identify trends (velocity, retention rates, struggling
areas). Highlight achievements (nodes mastered, streaks, improvements). Flag any areas where
retention_rate_7d < 0.60 or struggling_nodes >= 3. Compose a structured summary and deliver via
notify(channel="telegram", intent="send", message=<digest>).

Data-gathering guardrails:
1) Start with analytics_get_cross_topic(), then analytics_get_trend(mind_map_id, days=7) once per
   active mind map.
2) Call analytics_get_snapshot(mind_map_id) at most once per map, only when the 7-day trend is
   empty.
3) analytics_get_snapshot always returns a status field: status="ok" carries the snapshot and
   status="not_found" means none exists. If it returns status="not_found", do not retry the same call.
   Use mastery_get_map_summary() as a fallback and note that weekly analytics are not available yet.
4) If there are no active maps or no usable analytics/summary data, send one concise status message
   and stop.
"""

[[butler.schedule]]
name = "weekly-stale-flow-check"
cron = "0 4 * * 1"
dispatch_mode = "prompt"
prompt = """
Check for stale teaching flows and clean up associated pending review schedules. A flow is stale
if last_session_at is more than 30 days ago and status is not completed or abandoned. For each
stale flow: transition status to abandoned, call spaced_repetition_schedule_cleanup() to remove
pending review schedules, and store a memory fact recording the abandonment.
If any flows were abandoned, notify the user via notify(channel="telegram", intent="send",
message=<cleanup_summary>).
"""

[[butler.schedule]]
name = "daily-spaced-repetition-nudge"
cron = "0 17 * * *"
dispatch_mode = "prompt"
prompt = """
Daily spaced-repetition nudge (do not spam).

1) List active mind maps via mind_map_list(status="active").
2) For each map, call spaced_repetition_pending_reviews(mind_map_id).
3) If there are ZERO pending reviews across all maps: do nothing (do not notify).
4) If there are any pending reviews: send ONE Telegram message summarizing:
   - total pending count
   - per-curriculum topic list (mind map title → node labels)
   - for each item, include how overdue it is in whole days:
     overdue_days = max(0, floor((now_utc - parse_iso(next_review_at)).total_seconds / 86400))

Delivery:
- notify(channel="telegram", intent="send", message=<summary>)
- Keep it short and actionable; end with: "Reply ‘review’ and I’ll start the next one."
"""

[[butler.schedule]]
name = "daily_briefing_contribution"
cron = "55 6 * * *"
dispatch_mode = "job"
job_name = "daily_briefing_contribution"

[modules.education]

[modules.memory]
groups = ["core", "entity"]

[modules.contacts]
provider = "google"

# Google Drive module (optional — requires 'drive' scope on connected Google account).
# Enable by uncommenting and re-authorizing via /api/oauth/google/start?force_consent=true
