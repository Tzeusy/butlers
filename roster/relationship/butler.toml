[butler]
name = "relationship"
port = 41102
description = "Personal CRM. Manages contacts, relationships, important dates, interactions, gifts, and reminders."

[butler.runtime_seed]
max_concurrent_sessions = 3
liveness_ttl_seconds = 300
route_contract_min = 1
route_contract_max = 1
core_groups = [
    "infra",          # status, trigger, route.execute, tick, correct
    "state",          # state_get/set/delete/list — KV persistence
    "scheduling",     # schedule CRUD — dynamic reminders
    "sessions",       # sessions_list/get/summary/daily, top_sessions
    "notifications",  # notify, remind
    "media",          # get_attachment
    "temporal",       # deadlines, event_chains, seasonal_periods
]

[butler.db]
name = "butlers"
schema = "relationship"

[butler.switchboard]
url = "http://localhost:41100/mcp"

[[butler.schedule]]
name = "upcoming-dates-check"
cron = "0 8 * * *"
max_token_budget = 200_000
prompt = """
You have MCP tools wired into this session. Use them directly — do NOT explore
the codebase, read source files, probe HTTP endpoints, or run shell commands.

1. Call `upcoming_dates(days_ahead=7)` to get birthdays and anniversaries.
2. If the result is empty, exit silently (no notification needed).
3. If dates are found, draft a concise reminder and deliver via
   notify(channel="telegram", intent="send", message=<reminders>).
"""

[[butler.schedule]]
name = "relationship-maintenance"
cron = "0 9 * * 1"
max_token_budget = 300_000
prompt = """
You have MCP tools wired into this session. Use them directly — do NOT explore
the codebase, read source files, probe HTTP endpoints, or run shell commands.

Use the reconnect-planner skill to rank overdue contacts by Dunbar tier-weighted urgency
and suggest the top 3 reconnections for this week.

Steps:
1. Call contacts_overdue() to get overdue contacts with their dunbar_tier, dunbar_score,
   and effective_cadence fields.
2. For each overdue contact, compute urgency = (days_since_last_interaction / effective_cadence)
   * tier_weight + context_bonus, where tier_weight is:
   tier 5=5.0, tier 15=3.0, tier 50=2.0, tier 150=1.0, tier 500=0.5.
   Add context_bonus: +2.0 for upcoming date within 14 days, +1.0 for pending gift,
   +0.5 for positive emotional context in recent notes.
3. Sort by urgency descending, pick the top 3.
4. For each suggestion, gather context: last interaction, upcoming dates, notes, gifts.
5. Deliver the ranked suggestions via notify(channel="telegram", intent="send", message=<suggestions>).

If fewer than 3 contacts are overdue, suggest only those that qualify.
If no contacts are overdue, send: "All your key relationships are up to date — no overdue check-ins this week."
"""

[[butler.schedule]]
name = "memory_consolidation"
cron = "0 */6 * * *"
dispatch_mode = "job"
job_name = "memory_consolidation"

[[butler.schedule]]
name = "memory_episode_cleanup"
cron = "0 4 * * *"
dispatch_mode = "job"
job_name = "memory_episode_cleanup"

[[butler.schedule]]
name = "daily_briefing_contribution"
cron = "55 6 * * *"
dispatch_mode = "job"
job_name = "daily_briefing_contribution"

[[butler.schedule]]
name = "calendar_overlay_contribution"
cron = "50 6 * * *"
dispatch_mode = "job"
job_name = "calendar_overlay_contribution"

[[butler.schedule]]
name = "calendar_prep_contribution"
cron = "52 6 * * *"
dispatch_mode = "job"
job_name = "calendar_prep_contribution"

[[butler.schedule]]
name = "insight-scan"
cron = "0 7 * * *"
dispatch_mode = "job"
job_name = "insight_scan"

[[butler.schedule]]
name = "interaction-sync"
cron = "30 6 * * *"
dispatch_mode = "job"
job_name = "interaction_sync"

[[butler.schedule]]
name = "memory-curation"
cron = "0 3 * * 0"
dispatch_mode = "job"
job_name = "memory_curation"

[[butler.schedule]]
name = "pending-actions-curation"
cron = "0 4 * * *"
dispatch_mode = "job"
job_name = "pending_actions_curation"

[[butler.schedule]]
name = "fact-retraction-curation"
cron = "0 5 * * 1"
dispatch_mode = "job"
job_name = "fact_retraction_curation"

[[butler.schedule]]
name = "entity-dedup-curation"
cron = "0 6 * * 2"
dispatch_mode = "job"
job_name = "entity_dedup_curation"

[[butler.schedule]]
name = "episodic-predicate-curation"
cron = "0 5 * * 3"
dispatch_mode = "job"
job_name = "episodic_predicate_curation"

# contact-info-reconciler retired in migration bead 10 (bu-e2ja9 / core_115):
# public.contact_info is dropped, so the dual-write reconciler has nothing to
# sweep. Re-adding it would throw UndefinedTableError every 30 minutes.

[modules.calendar]
provider = "google"
groups = ["core"]

[modules.calendar.conflicts]
policy = "suggest"

[modules.contacts]
providers = [{type = "google"}, {type = "telegram"}]
include_other_contacts = false

[modules.contacts.sync]
enabled = true
run_on_startup = true
interval_minutes = 15
full_sync_interval_days = 6

[modules.memory]
groups = ["core", "feedback", "entity", "admin"]

[modules.approvals]
groups = ["actions"]

[modules.relationship]
groups = ["contacts", "interactions", "management", "tracking"]

# Google Drive module (optional — requires 'drive' scope on connected Google account).
