[butler]
name = "relationship"
port = 41102
description = "Personal CRM. Manages contacts, relationships, important dates, interactions, gifts, and reminders."

[butler.runtime]
max_concurrent_sessions = 3

[butler.db]
name = "butlers"
schema = "relationship"

[butler.switchboard]
url = "http://localhost:41100/mcp"

[butler.seed_configs]
runtime_type = "codex"
model = "gpt-5.1"
liveness_ttl_seconds = 300
route_contract_min = 1
route_contract_max = 1

[[butler.schedule]]
name = "upcoming-dates-check"
cron = "0 8 * * *"
prompt = """
Check for important dates in the next 7 days (birthdays, anniversaries).
For each, draft a reminder message. If any dates are upcoming, deliver the
compiled reminder via notify(channel="telegram", intent="send", message=<reminders>).
"""

[[butler.schedule]]
name = "relationship-maintenance"
cron = "0 9 * * 1"
prompt = """
Use the reconnect-planner skill to rank overdue contacts by Dunbar tier-weighted urgency
and suggest the top 3 reconnections for this week.

Steps:
1. Call contacts_overdue() to get overdue contacts with their dunbar_tier, dunbar_score,
   and effective_cadence fields.
2. For each overdue contact, compute urgency = (days_since_last_interaction / effective_cadence)
   * tier_weight + context_bonus, where tier_weight is:
   tier 5=5.0, tier 15=3.0, tier 50=2.0, tier 150=1.0, tier 500=0.5.
   Add context_bonus: +2.0 for upcoming date within 14 days, +1.0 for pending gift,
   +0.5 for positive emotional context in recent notes.
3. Sort by urgency descending, pick the top 3.
4. For each suggestion, gather context: last interaction, upcoming dates, notes, gifts.
5. Deliver the ranked suggestions via notify(channel="telegram", intent="send", message=<suggestions>).

If fewer than 3 contacts are overdue, suggest only those that qualify.
If no contacts are overdue, send: "All your key relationships are up to date — no overdue check-ins this week."
"""

[[butler.schedule]]
name = "memory_consolidation"
cron = "0 */6 * * *"
dispatch_mode = "job"
job_name = "memory_consolidation"

[[butler.schedule]]
name = "memory_episode_cleanup"
cron = "0 4 * * *"
dispatch_mode = "job"
job_name = "memory_episode_cleanup"

[[butler.schedule]]
name = "daily_briefing_contribution"
cron = "55 6 * * *"
dispatch_mode = "job"
job_name = "daily_briefing_contribution"

[[butler.schedule]]
name = "insight-scan"
cron = "0 7 * * *"
dispatch_mode = "job"
job_name = "insight_scan"

[modules.calendar]
provider = "google"

[modules.calendar.conflicts]
policy = "suggest"

[modules.contacts]
providers = [{type = "google"}, {type = "telegram"}]
include_other_contacts = false

[modules.contacts.sync]
enabled = true
run_on_startup = true
interval_minutes = 15
full_sync_interval_days = 6

[modules.memory]

[modules.relationship]

# Google Drive module (optional — requires 'drive' scope on connected Google account).
# Enable by uncommenting and re-authorizing via /api/oauth/google/start?force_consent=true
