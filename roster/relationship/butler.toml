[butler]
name = "relationship"
port = 41102
description = "Personal CRM. Manages contacts, relationships, important dates, interactions, gifts, and reminders."

[butler.runtime]
model = "gpt-5.1"
max_concurrent_sessions = 3

[runtime]
type = "codex"

[butler.db]
name = "butlers"
schema = "relationship"

[butler.switchboard]
url = "http://localhost:41100/mcp"
advertise = true
liveness_ttl_s = 300
route_contract_min = "route.v1"
route_contract_max = "route.v1"

[[butler.schedule]]
name = "upcoming-dates-check"
cron = "25 21 * * 0"
prompt = """
Check for important dates in the next 7 days (birthdays, anniversaries).
For each, draft a reminder message. If any dates are upcoming, deliver the
compiled reminder via notify(channel="telegram", intent="send", message=<reminders>).
"""

[[butler.schedule]]
name = "relationship-maintenance"
cron = "0 9 * * 1"
prompt = """
Review contacts I haven't interacted with in 30+ days.
Suggest 3 people I should reach out to this week, with context
on our last interaction and any upcoming dates.
Deliver the suggestions via notify(channel="telegram", intent="send", message=<suggestions>).
"""

[[butler.schedule]]
name = "memory_consolidation"
cron = "0 */6 * * *"
dispatch_mode = "job"
job_name = "memory_consolidation"

[[butler.schedule]]
name = "memory_episode_cleanup"
cron = "0 4 * * *"
dispatch_mode = "job"
job_name = "memory_episode_cleanup"

[modules.calendar]
provider = "google"

[modules.calendar.conflicts]
policy = "suggest"

[modules.contacts]
providers = [{type = "google"}, {type = "telegram"}]
include_other_contacts = false

[modules.contacts.sync]
enabled = true
run_on_startup = true
interval_minutes = 15
full_sync_interval_days = 6

[modules.memory]

[modules.relationship]
