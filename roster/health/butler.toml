[butler]
name = "health"
port = 41103
description = "Health tracking assistant for measurements, medications, diet, food preferences, nutrition, meals, and symptoms"

[butler.runtime_seed]
max_concurrent_sessions = 3
liveness_ttl_seconds = 300
route_contract_min = 1
route_contract_max = 1

[butler.db]
name = "butlers"
schema = "health"

[butler.switchboard]
url = "http://localhost:41100/mcp"

[[butler.schedule]]
name = "weekly-health-summary"
cron = "0 9 * * 0"
prompt = """
Generate a comprehensive weekly health summary including:
- Weight trend over the past week (if weight measurements exist)
- Medication adherence rates for each active medication over the past week
- Symptom frequency and patterns over the past week
- Any notable changes or patterns identified from the data
Use the health_summary and trend_report tools to compile this data.
Deliver the summary via notify(channel="telegram", intent="send", message=<summary>).
"""

[[butler.schedule]]
name = "memory_consolidation"
cron = "0 */6 * * *"
dispatch_mode = "job"
job_name = "memory_consolidation"

[[butler.schedule]]
name = "memory_episode_cleanup"
cron = "0 4 * * *"
dispatch_mode = "job"
job_name = "memory_episode_cleanup"

[[butler.schedule]]
name = "memory_purge_superseded"
cron = "10 4 * * *"
dispatch_mode = "job"
job_name = "memory_purge_superseded"

[[butler.schedule]]
name = "daily_briefing_contribution"
cron = "55 6 * * *"
dispatch_mode = "job"
job_name = "daily_briefing_contribution"

[[butler.schedule]]
name = "calendar_overlay_contribution"
cron = "50 6 * * *"
dispatch_mode = "job"
job_name = "calendar_overlay_contribution"

[[butler.schedule]]
name = "insight_scan"
# Weekly (Mondays 07:00 UTC) so cross-signal correlation freshness meets the
# Insight pillar. Changed from the prior monthly "0 7 15 * *"; the job is
# per-deployment (not per-pageview) so weekly stays cost-safe.
cron = "0 7 * * 1"
dispatch_mode = "job"
job_name = "insight_scan"

[modules.calendar]
provider = "google"
groups = ["core", "butler_events"]

[modules.calendar.conflicts]
policy = "suggest"

[modules.contacts]
provider = "google"
include_other_contacts = false

[modules.contacts.sync]
enabled = true
run_on_startup = true
interval_minutes = 15
full_sync_interval_days = 6

[modules.health]

[modules.home_assistant]
groups = ["core", "history"]
read_only = true

[modules.memory]
groups = ["core", "entity", "preferences"]

[modules.google_drive]

[modules.google_health]
